{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background-color: #e9ecef;
        }

        .left-side {
            background-color: #212529;
            color: white;
            height: 100vh;
        }

        .brand-text {
            font-size: 32px;
            font-weight: 600;
        }

        .right-side {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-card {
            width: 100%;
            max-width: 420px;
            border-radius: 10px;
        }

        .register-btn {
            background-color: #0d6efd;
            border: none;
        }

        .register-btn:hover {
            background-color: #0b5ed7;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- LEFT SIDE -->
        <div class="col-md-6 left-side d-none d-md-flex flex-column justify-content-center align-items-center text-center">
            <div>
                <div class="brand-text mb-3">💰 ExpenseTracker</div>
                <p class="text-light">
                    Start tracking your income and expenses today.<br>
                    Simple. Secure. Smart.
                </p>
            </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="col-md-6 right-side">

            <div class="card shadow border-0 p-4 register-card">

                <h4 class="mb-4 text-center">Create Account</h4>

                <form method="POST">
                    
                    {% csrf_token %}

                        
            
                    

                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="user_name" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control">
                    </div>

                 <div class="mb-4">
                        <label class="form-label">Confirm Password</label>
                        <input type="password" name="password2" class="form-control">
                    </div> 

                    <div class="d-grid">
                        <button type="submit" class="btn register-btn text-white">
                            Register
                        </button>
                    </div>

                    <div class="text-center mt-3">
                        <small>
                            Already have an account?
                            <a href="{% url 'login_view' %}" class="text-decoration-none">
                                Login
                            </a>
                        </small>
                    </div>

                </form>

            </div>

        </div>

    </div>
</div>

<div class="toast-container position-fixed top-0 end-0 p-3">

{% if messages %}
{% for message in messages %}

<div class="toast align-items-center text-white 
{% if message.tags == 'success' %} bg-success
{% elif message.tags == 'error' %} bg-danger
{% elif message.tags == 'warning' %} bg-warning
{% endif %}
border-0 mb-2" role="alert">

<div class="d-flex">
<div class="toast-body">
{{ message }}
</div>

<button type="button" class="btn-close btn-close-white me-2 m-auto"
data-bs-dismiss="toast"></button>

</div>
</div>

{% endfor %}
{% endif %}

</div>


{% block js %} <script src="{% static "script/register.js" %}"></script> {% endblock js %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
